<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Agente de Emails <?= VERSION ?></title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,sans-serif;background:#f0f2f5;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:28px 16px}
    .card{background:#fff;border-radius:12px;padding:28px;width:100%;max-width:720px;box-shadow:0 2px 12px rgba(0,0,0,.08)}
    .top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:18px}
    h1{font-size:20px;color:#1a1a2e}
    .version{font-size:11px;background:#f1f5f9;color:#64748b;padding:2px 8px;border-radius:20px;font-weight:700}

    .tabs{display:flex;gap:4px;border-bottom:2px solid #e2e8f0;margin-bottom:20px}
    .tab{background:none;border:none;padding:8px 16px;font-size:13px;font-weight:600;color:#94a3b8;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;border-radius:0}
    .tab.active{color:#4f46e5;border-bottom-color:#4f46e5}
    .tab:hover{color:#4f46e5}

    .section-title{font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
    .rules-box{border:1px solid #e2e8f0;border-radius:8px;padding:10px 14px;margin-bottom:16px;min-height:44px}
    .rule-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #f8fafc}
    .rule-item:last-child{border:none}
    .rule-item label{font-size:13px;color:#334155;cursor:pointer;flex:1}
    .rule-item input[type=checkbox]{width:15px;height:15px;cursor:pointer;accent-color:#4f46e5}

    .btn-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
    button{padding:9px 16px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s}
    button:hover:not(:disabled){opacity:.85}
    button:disabled{opacity:.4;cursor:not-allowed}
    .btn-run{background:#4f46e5;color:#fff}
    .btn-ghost{background:#f1f5f9;color:#475569;border:1px solid #e2e8f0}
    .btn-save{background:#059669;color:#fff}
    .btn-danger{background:#fee2e2;color:#991b1b;border:1px solid #fecaca}

    #status{font-size:13px;color:#6b7280;margin-bottom:10px;min-height:20px}
    #log-box{background:#0f172a;border-radius:8px;padding:14px;min-height:120px;max-height:360px;overflow-y:auto}
    .log-empty{color:#475569;font-size:13px;font-style:italic}
    .log-item{font-size:13px;color:#e2e8f0;padding:4px 0;border-bottom:1px solid #1e293b;line-height:1.5}
    .log-item:last-child{border:none}
    .api-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
    .api-badge{font-size:12px;padding:3px 10px;border-radius:20px;font-weight:600}
    .api-ok{background:#dcfce7;color:#166534}
    .api-err{background:#fee2e2;color:#991b1b}
    .diag-thread{background:#1e293b;border-radius:6px;padding:10px 12px;margin-bottom:8px}
    .diag-from{color:#94a3b8;font-size:11px;margin-bottom:2px}
    .diag-subject{color:#e2e8f0;font-size:13px;font-weight:600;margin-bottom:4px}
    .tag{font-size:11px;padding:2px 8px;border-radius:20px;display:inline-block}
    .tag-match{background:#166534;color:#bbf7d0}
    .tag-ai{background:#1e3a5f;color:#93c5fd}
    .diag-labels{color:#64748b;font-size:11px;margin-top:4px}

    /* Shared config/rules styles */
    .config-col-label{font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;margin-bottom:6px}
    .label-search{width:100%;padding:6px 10px;border:1px solid #e2e8f0;border-radius:6px;font-size:12px;margin-bottom:6px}
    .label-list{max-height:160px;overflow-y:auto;border:1px solid #f1f5f9;border-radius:6px;padding:4px}
    .label-check-item{display:flex;align-items:center;gap:6px;padding:3px 6px;border-radius:4px;cursor:pointer}
    .label-check-item:hover{background:#f8fafc}
    .label-check-item.hidden{display:none}
    .label-check-item input{accent-color:#4f46e5;cursor:pointer}
    .label-check-item span{font-size:12px;color:#334155}
    .forward-row{padding:10px 0 0;display:flex;flex-direction:column;gap:4px}
    .forward-input{width:100%;padding:7px 10px;border:1px solid #e2e8f0;border-radius:6px;font-size:13px;color:#334155}
    .forward-input:focus{outline:none;border-color:#4f46e5}
    .archive-toggle{display:flex;align-items:center;gap:8px;padding:10px 0 0}
    .archive-toggle input{width:16px;height:16px;accent-color:#4f46e5;cursor:pointer}
    .archive-toggle label{font-size:13px;color:#374151;cursor:pointer}
    .global-config-box{border:1px solid #e2e8f0;border-radius:10px;padding:16px;margin-bottom:18px;background:#fafafa}
    .global-row{display:flex;gap:20px;flex-wrap:wrap}
    .global-field{display:flex;flex-direction:column;gap:4px;min-width:160px}
    .global-field label{font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase}
    .global-field input{padding:7px 10px;border:1px solid #e2e8f0;border-radius:6px;font-size:13px;width:100%}
    .global-field input:focus{outline:none;border-color:#4f46e5}
    #config-status{font-size:13px;margin-top:12px;min-height:20px}

    /* Rules CRUD */
    .rule-list-item{border:1px solid #e2e8f0;border-radius:10px;padding:14px 16px;margin-bottom:10px;transition:opacity .2s}
    .rule-list-item.disabled{opacity:.45}
    .rule-list-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
    .rule-list-name{font-size:14px;font-weight:700;color:#1e293b}
    .rule-list-actions{display:flex;gap:6px;align-items:center}
    .rule-list-desc{font-size:12px;color:#64748b;margin-top:2px}
    .toggle-label{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:#64748b;cursor:pointer}
    .cond-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
    .cond-type{padding:7px 8px;border:1px solid #e2e8f0;border-radius:6px;font-size:12px;flex:0 0 220px}
    .cond-value{flex:1;padding:7px 10px;border:1px solid #e2e8f0;border-radius:6px;font-size:12px;color:#334155}
    .cond-type:focus,.cond-value:focus{outline:none;border-color:#4f46e5}
    .cond-remove{background:none;border:1px solid #e2e8f0;border-radius:6px;width:30px;height:30px;cursor:pointer;color:#94a3b8;font-size:14px;padding:0;flex-shrink:0;display:flex;align-items:center;justify-content:center}
    .cond-remove:hover{border-color:#f87171;color:#f87171}
    .form-field{margin-bottom:14px}
    .form-field > label{display:block;font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;margin-bottom:6px}
    .form-input{width:100%;padding:8px 10px;border:1px solid #e2e8f0;border-radius:6px;font-size:13px;color:#334155}
    .form-input:focus{outline:none;border-color:#4f46e5}
    .section-box{border:1px solid #e2e8f0;border-radius:10px;padding:14px;margin-bottom:14px}
    .logic-select{padding:6px 10px;border:1px solid #e2e8f0;border-radius:6px;font-size:12px}
    #rules-tab-status,#rules-form-status{font-size:13px;margin-top:8px;min-height:18px}

    .spinner{display:inline-block;width:13px;height:13px;border:2px solid #6b7280;border-top-color:#4f46e5;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:5px}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div class="card">
  <div class="top">
    <h1>📬 Agente de Emails</h1>
    <span class="version"><?= VERSION ?></span>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('exec')">Execução</button>
    <button class="tab" onclick="showTab('rules')">📋 Regras</button>
    <button class="tab" onclick="showTab('config')">⚙️ Configurações</button>
  </div>

  <!-- ===== ABA EXECUÇÃO ===== -->
  <div id="tab-exec">
    <div class="section-title">Regras disponíveis</div>
    <div class="rules-box" id="rules-box"><div class="log-empty">Carregando...</div></div>
    <div class="btn-row">
      <button class="btn-run" onclick="rodar()">▶️ Executar selecionadas</button>
      <button class="btn-ghost" onclick="diagnosticar()">🔍 Diagnóstico</button>
      <button class="btn-ghost" onclick="testarAPIs()">🔑 Testar APIs</button>
    </div>
    <div id="status">—</div>
    <div id="log-box"><div class="log-empty">Os resultados aparecerão aqui.</div></div>
  </div>

  <!-- ===== ABA REGRAS ===== -->
  <div id="tab-rules" style="display:none">

    <!-- Lista de regras -->
    <div id="rules-list-view">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <div class="section-title" style="margin:0">Regras configuradas</div>
        <button class="btn-run" style="padding:7px 14px;font-size:12px" onclick="novaRegra()">+ Nova Regra</button>
      </div>
      <div id="rules-crud-list"><div class="log-empty"><span class="spinner"></span>Carregando...</div></div>
    </div>

    <!-- Formulário criar / editar -->
    <div id="rules-form-view" style="display:none">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <div class="section-title" style="margin:0" id="form-view-title">Nova Regra</div>
        <button class="btn-ghost" style="padding:6px 12px;font-size:12px" onclick="mostrarListaRegras()">← Voltar</button>
      </div>

      <input type="hidden" id="rule-edit-id">

      <div class="form-field">
        <label>Nome da Regra</label>
        <input type="text" id="rule-edit-name" class="form-input" placeholder="Ex: Daycoval Seguros">
      </div>

      <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
        <input type="checkbox" id="rule-edit-enabled" style="width:16px;height:16px;accent-color:#4f46e5;cursor:pointer" checked>
        <label for="rule-edit-enabled" style="font-size:13px;color:#374151;cursor:pointer">Regra ativa</label>
      </div>

      <!-- Condições -->
      <div class="section-box">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <div class="section-title" style="margin:0">Condições</div>
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:12px;color:#64748b;font-weight:600">Lógica:</span>
            <select id="rule-edit-logic" class="logic-select">
              <option value="OR">Qualquer uma (OU)</option>
              <option value="AND">Todas (E)</option>
            </select>
          </div>
        </div>
        <div id="conditions-container"></div>
        <button class="btn-ghost" onclick="addConditionRow()" style="margin-top:4px;font-size:12px;padding:6px 12px">+ Adicionar condição</button>
      </div>

      <!-- Ações -->
      <div class="section-box">
        <div class="section-title" style="margin-bottom:10px">Ações</div>
        <div class="config-col-label">Labels a aplicar</div>
        <input class="label-search" type="text" id="rule-label-search" placeholder="Filtrar labels..." oninput="filtrarLabelsForm(this)">
        <div class="label-list" id="rule-labels-list"><div class="log-empty">Carregando labels...</div></div>
        <div class="forward-row">
          <div class="config-col-label">Encaminhar para (vazio = não encaminhar)</div>
          <input class="forward-input" type="email" id="rule-edit-forward" placeholder="email@exemplo.com">
        </div>
        <div class="archive-toggle">
          <input type="checkbox" id="rule-edit-archive">
          <label for="rule-edit-archive">Arquivar e-mail após processar</label>
        </div>
      </div>

      <div class="btn-row">
        <button class="btn-save" onclick="salvarRegraDinamica()">💾 Salvar regra</button>
        <button class="btn-ghost" onclick="mostrarListaRegras()">Cancelar</button>
      </div>
      <div id="rules-form-status"></div>
    </div>

    <div id="rules-tab-status"></div>
  </div>

  <!-- ===== ABA CONFIGURAÇÕES ===== -->
  <div id="tab-config" style="display:none">
    <div class="global-config-box">
      <div style="font-size:14px;font-weight:700;color:#1e293b;margin-bottom:12px">⚙️ Configurações Globais</div>
      <div class="global-row">
        <div class="global-field">
          <label>Máx. e-mails por rodada</label>
          <input type="number" id="cfg-max-threads" min="1" max="50" value="15">
        </div>
        <div class="global-field">
          <label>Intervalo entre e-mails (ms)</label>
          <input type="number" id="cfg-sleep-ms" min="200" max="5000" step="100" value="1200">
        </div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn-save" onclick="salvarConfig()">💾 Salvar configurações</button>
    </div>
    <div id="config-status"></div>
  </div>
</div>

<script>
  var _rules        = [];
  var _labels       = [];
  var _dynamicRules = [];
  var _configLoaded = false;
  var _rulesLoaded  = false;

  var COND_LABELS = {
    sender_domain:   "Domínio do remetente",
    sender_email:    "Email do remetente",
    sender_contains: "Remetente contém",
    subject:         "Assunto (use * como curinga)"
  };

  // ── Inicialização: carrega regras para aba Execução ──
  google.script.run
    .withSuccessHandler(function(names) { _rules = names || []; renderExecRules(); })
    .withFailureHandler(function(e) {
      document.getElementById("rules-box").innerHTML = '<span style="color:#f87171">' + e.message + '</span>';
    })
    .getRules();

  function renderExecRules() {
    var box = document.getElementById("rules-box");
    if (!_rules.length) { box.innerHTML = '<span style="color:#f87171">Nenhuma regra encontrada.</span>'; return; }
    box.innerHTML = _rules.map(function(n, i) {
      return '<div class="rule-item">' +
        '<input type="checkbox" id="r' + i + '" value="' + esc(n) + '" checked>' +
        '<label for="r' + i + '">' + esc(n) + '</label></div>';
    }).join("");
  }

  // ── Tabs ──
  function showTab(name) {
    ["exec","rules","config"].forEach(function(t) {
      document.getElementById("tab-" + t).style.display = (t === name) ? "" : "none";
    });
    document.querySelectorAll(".tab").forEach(function(btn, i) {
      btn.classList.toggle("active", ["exec","rules","config"][i] === name);
    });
    if (name === "config" && !_configLoaded) loadConfigTab();
    if (name === "rules"  && !_rulesLoaded)  loadRulesTab();
  }

  // ── Aba Configurações ──
  function loadConfigTab() {
    _configLoaded = true;
    google.script.run
      .withSuccessHandler(function(g) {
        if (!g) return;
        var mt = document.getElementById("cfg-max-threads");
        var sm = document.getElementById("cfg-sleep-ms");
        if (mt && g.maxThreads) mt.value = g.maxThreads;
        if (sm && g.sleepMs)    sm.value = g.sleepMs;
      })
      .withFailureHandler(function() {})
      .getGlobalConfig();
  }

  function salvarConfig() {
    var globalCfg = {
      maxThreads: parseInt(document.getElementById("cfg-max-threads").value) || 15,
      sleepMs:    parseInt(document.getElementById("cfg-sleep-ms").value)    || 1200
    };
    document.getElementById("config-status").innerHTML = '<span class="spinner"></span>Salvando...';
    google.script.run
      .withSuccessHandler(function() {
        document.getElementById("config-status").innerHTML = '✅ Salvo em ' + new Date().toLocaleTimeString("pt-BR");
      })
      .withFailureHandler(function(e) {
        document.getElementById("config-status").innerHTML = '❌ ' + e.message;
      })
      .salvarGlobalConfig(globalCfg);
  }

  // ── Aba Regras ──
  function loadRulesTab() {
    _rulesLoaded = true;
    var labelsOk = false, rulesOk = false;
    function tryRender() { if (labelsOk && rulesOk) renderRulesCrudList(); }

    google.script.run
      .withSuccessHandler(function(l) { _labels = l || []; labelsOk = true; tryRender(); })
      .withFailureHandler(function(e) {
        document.getElementById("rules-crud-list").innerHTML = '<span style="color:#f87171">' + e.message + '</span>';
      })
      .getLabelsDisponiveis();

    google.script.run
      .withSuccessHandler(function(rules) { _dynamicRules = rules || []; rulesOk = true; tryRender(); })
      .withFailureHandler(function(e) {
        document.getElementById("rules-crud-list").innerHTML = '<span style="color:#f87171">' + e.message + '</span>';
      })
      .getDynamicRules();
  }

  function renderRulesCrudList() {
    var el = document.getElementById("rules-crud-list");
    if (!_dynamicRules.length) {
      el.innerHTML = '<div class="log-empty">Nenhuma regra criada. Clique em "+ Nova Regra" para começar.</div>';
      return;
    }
    el.innerHTML = _dynamicRules.map(function(r, i) {
      var enabled  = r.enabled !== false;
      var sep      = r.logic === "AND" ? " E " : " OU ";
      var condDesc = (r.conditions || []).map(function(c) {
        return (COND_LABELS[c.type] || c.type) + ': "' + esc(c.value) + '"';
      }).join(sep);
      var lblDesc  = (r.action && r.action.labels && r.action.labels.length)
        ? "Labels: " + esc(r.action.labels.join(", ")) : "";

      return '<div class="rule-list-item' + (enabled ? "" : " disabled") + '">' +
        '<div class="rule-list-header">' +
          '<span class="rule-list-name">' + esc(r.name) + '</span>' +
          '<div class="rule-list-actions">' +
            '<label class="toggle-label">' +
              '<input type="checkbox" ' + (enabled ? "checked" : "") + ' onchange="toggleRegraDinamica(' + i + ',this.checked)" style="accent-color:#4f46e5;cursor:pointer">' +
              (enabled ? "Ativa" : "Inativa") +
            '</label>' +
            '<button class="btn-ghost" onclick="editarRegraDinamica(' + i + ')" style="padding:5px 10px;font-size:12px">✏️ Editar</button>' +
            '<button class="btn-danger" onclick="deletarRegraDinamica(' + i + ')" style="padding:5px 10px;font-size:12px;border-radius:8px;cursor:pointer">🗑️</button>' +
          '</div>' +
        '</div>' +
        '<div class="rule-list-desc">' + (condDesc || "(sem condições)") + '</div>' +
        (lblDesc ? '<div class="rule-list-desc" style="color:#4f46e5;margin-top:3px">' + lblDesc + '</div>' : '') +
      '</div>';
    }).join("");
  }

  function novaRegra() {
    document.getElementById("form-view-title").textContent = "Nova Regra";
    document.getElementById("rule-edit-id").value      = "";
    document.getElementById("rule-edit-name").value    = "";
    document.getElementById("rule-edit-enabled").checked = true;
    document.getElementById("rule-edit-logic").value   = "OR";
    document.getElementById("conditions-container").innerHTML = "";
    document.getElementById("rule-edit-forward").value = "";
    document.getElementById("rule-edit-archive").checked = false;
    renderFormLabels([]);
    addConditionRow();
    mostrarFormView();
  }

  function editarRegraDinamica(idx) {
    var r = _dynamicRules[idx];
    document.getElementById("form-view-title").textContent = "Editar Regra";
    document.getElementById("rule-edit-id").value         = r.id || "";
    document.getElementById("rule-edit-name").value       = r.name || "";
    document.getElementById("rule-edit-enabled").checked  = r.enabled !== false;
    document.getElementById("rule-edit-logic").value      = r.logic || "OR";
    document.getElementById("conditions-container").innerHTML = "";
    (r.conditions || []).forEach(function(c) { addConditionRow(c.type, c.value); });
    if (!r.conditions || !r.conditions.length) addConditionRow();
    document.getElementById("rule-edit-forward").value    = (r.action && r.action.encaminhar) || "";
    document.getElementById("rule-edit-archive").checked  = !!(r.action && r.action.arquivar);
    renderFormLabels((r.action && r.action.labels) || []);
    mostrarFormView();
  }

  function mostrarFormView() {
    document.getElementById("rules-list-view").style.display = "none";
    document.getElementById("rules-form-view").style.display = "";
    document.getElementById("rules-form-status").innerHTML   = "";
    document.getElementById("rule-label-search").value      = "";
  }

  function mostrarListaRegras() {
    document.getElementById("rules-list-view").style.display = "";
    document.getElementById("rules-form-view").style.display = "none";
  }

  function addConditionRow(type, value) {
    var div = document.createElement("div");
    div.className = "cond-row";
    div.innerHTML =
      '<select class="cond-type">' +
        '<option value="sender_domain">Domínio do remetente</option>' +
        '<option value="sender_email">Email do remetente</option>' +
        '<option value="sender_contains">Remetente contém</option>' +
        '<option value="subject">Assunto (use * como curinga)</option>' +
      '</select>' +
      '<input type="text" class="cond-value" placeholder="Ex: daycovalseguros.com.br">' +
      '<button class="cond-remove" onclick="this.parentElement.remove()" title="Remover">✕</button>';
    document.getElementById("conditions-container").appendChild(div);
    if (type)  div.querySelector(".cond-type").value  = type;
    if (value !== undefined) div.querySelector(".cond-value").value = value;
  }

  function renderFormLabels(selected) {
    var sel = {};
    (selected || []).forEach(function(l) { sel[l] = true; });
    document.getElementById("rule-labels-list").innerHTML = _labels.length
      ? _labels.map(function(l) {
          return '<label class="label-check-item">' +
            '<input type="checkbox" class="form-lbl-cb" value="' + esc(l) + '"' + (sel[l] ? " checked" : "") + '>' +
            '<span>' + esc(l) + '</span></label>';
        }).join("")
      : '<div class="log-empty">Nenhum label disponível no Gmail.</div>';
  }

  function filtrarLabelsForm(input) {
    var term = input.value.toLowerCase();
    document.querySelectorAll("#rule-labels-list .label-check-item").forEach(function(item) {
      var text = item.querySelector("span").textContent.toLowerCase();
      item.classList.toggle("hidden", term.length > 0 && text.indexOf(term) === -1);
    });
  }

  function salvarRegraDinamica() {
    var name = document.getElementById("rule-edit-name").value.trim();
    if (!name) {
      document.getElementById("rules-form-status").innerHTML = '❌ Informe um nome para a regra.';
      return;
    }

    var conditions = [];
    document.querySelectorAll("#conditions-container .cond-row").forEach(function(row) {
      var type  = row.querySelector(".cond-type").value;
      var value = row.querySelector(".cond-value").value.trim();
      if (value) conditions.push({ type: type, value: value });
    });

    var labels = [];
    document.querySelectorAll(".form-lbl-cb:checked").forEach(function(cb) { labels.push(cb.value); });

    var existingId = document.getElementById("rule-edit-id").value;
    var rule = {
      id:         existingId || ("rule_" + Date.now()),
      name:       name,
      enabled:    document.getElementById("rule-edit-enabled").checked,
      conditions: conditions,
      logic:      document.getElementById("rule-edit-logic").value,
      action: {
        labels:     labels,
        encaminhar: document.getElementById("rule-edit-forward").value.trim(),
        arquivar:   document.getElementById("rule-edit-archive").checked
      }
    };

    var idx = -1;
    _dynamicRules.forEach(function(r, i) { if (r.id === rule.id) idx = i; });
    if (idx >= 0) { _dynamicRules[idx] = rule; } else { _dynamicRules.push(rule); }

    document.getElementById("rules-form-status").innerHTML = '<span class="spinner"></span>Salvando...';

    google.script.run
      .withSuccessHandler(function() {
        renderRulesCrudList();
        mostrarListaRegras();
        google.script.run.withSuccessHandler(function(n) { _rules = n || []; renderExecRules(); }).getRules();
        showStatusMsg("rules-tab-status", "✅ Regra salva.");
      })
      .withFailureHandler(function(e) {
        document.getElementById("rules-form-status").innerHTML = '❌ ' + e.message;
      })
      .saveDynamicRules(_dynamicRules);
  }

  function toggleRegraDinamica(idx, enabled) {
    _dynamicRules[idx].enabled = enabled;
    google.script.run
      .withSuccessHandler(function() {
        renderRulesCrudList();
        google.script.run.withSuccessHandler(function(n) { _rules = n || []; renderExecRules(); }).getRules();
      })
      .withFailureHandler(function(e) { showStatusMsg("rules-tab-status", "❌ " + e.message); })
      .saveDynamicRules(_dynamicRules);
  }

  function deletarRegraDinamica(idx) {
    if (!confirm('Deletar a regra "' + _dynamicRules[idx].name + '"?')) return;
    _dynamicRules.splice(idx, 1);
    google.script.run
      .withSuccessHandler(function() {
        renderRulesCrudList();
        google.script.run.withSuccessHandler(function(n) { _rules = n || []; renderExecRules(); }).getRules();
        showStatusMsg("rules-tab-status", "✅ Regra deletada.");
      })
      .withFailureHandler(function(e) { showStatusMsg("rules-tab-status", "❌ " + e.message); })
      .saveDynamicRules(_dynamicRules);
  }

  function showStatusMsg(elId, msg) {
    var el = document.getElementById(elId);
    if (el) { el.innerHTML = msg; setTimeout(function() { el.innerHTML = ""; }, 4000); }
  }

  // ── Execução ──
  function getSelected() {
    return Array.from(document.querySelectorAll(".rule-item input:checked")).map(function(cb) { return cb.value; });
  }

  function rodar() {
    var sel = getSelected();
    if (!sel.length) { setStatus("⚠️ Selecione ao menos uma regra.", false); return; }
    setBusy("Executando: " + sel.join(", ") + "...");
    google.script.run.withSuccessHandler(onSuccess).withFailureHandler(onError).organizarEmails(sel);
  }

  function diagnosticar() {
    setBusy("Lendo inbox (sem modificar)...");
    google.script.run.withSuccessHandler(onDiag).withFailureHandler(onError).diagnosticar();
  }

  function testarAPIs() {
    setBusy("Verificando chaves...");
    google.script.run.withSuccessHandler(onAPIs).withFailureHandler(onError).testarAPIs();
  }

  function onSuccess(r) {
    var logs = r.logs || [], total = r.total || 0;
    setStatus("✅ Concluído — " + total + " thread(s) · " + new Date().toLocaleTimeString("pt-BR"), false);
    var box = document.getElementById("log-box");
    box.innerHTML = logs.length
      ? logs.map(function(l) { return '<div class="log-item">' + l + '</div>'; }).join("")
      : '<div class="log-empty">Nenhuma ação registrada.</div>';
    box.scrollTop = box.scrollHeight;
  }

  function onDiag(r) {
    var threads = r.threads || [];
    setStatus("🔍 " + threads.length + " não lido(s) no inbox · " + r.timestamp, false);
    var box = document.getElementById("log-box");
    if (!threads.length) { box.innerHTML = '<div class="log-empty">Inbox vazio.</div>'; return; }
    box.innerHTML = threads.map(function(t) {
      if (t.erro) return '<div class="diag-thread" style="color:#f87171">' + t.erro + '</div>';
      var match = t.regra !== "nenhuma";
      return '<div class="diag-thread">' +
        '<div class="diag-from">' + esc(t.from) + '</div>' +
        '<div class="diag-subject">' + esc(t.subject) + '</div>' +
        '<span class="tag ' + (match ? "tag-match" : "tag-ai") + '">' + esc(match ? t.regra : "→ IA geral") + '</span>' +
        '<div class="diag-labels">' + (t.labels.length ? "Labels: " + t.labels.join(", ") : "Sem labels") + '</div>' +
        '</div>';
    }).join("");
  }

  function onAPIs(r) {
    var badges = ["GEMINI","GROQ","CLAUDE","OPENAI"].map(function(p) {
      var ok = r[p] === "ok";
      return '<span class="api-badge ' + (ok ? "api-ok" : "api-err") + '">' + (ok ? "✓" : "✗") + " " + p + '</span>';
    }).join("");
    setStatus("🔑 Status das chaves de API:", false);
    document.getElementById("log-box").innerHTML =
      '<div style="padding:8px 0"><div class="api-row">' + badges + '</div>' +
      (r._erro ? '<div style="color:#f87171;font-size:12px;margin-top:8px">' + r._erro + '</div>' : '') +
      '<div style="color:#64748b;font-size:12px;margin-top:12px">Chaves faltando: configure em <strong>Configurações do projeto → Propriedades do script</strong>.</div></div>';
  }

  function onError(err) {
    setStatus("❌ " + err.message, false);
    document.getElementById("log-box").innerHTML = '<div style="color:#f87171;font-size:13px">' + err.message + '</div>';
  }

  function setBusy(msg) {
    document.querySelectorAll("button").forEach(function(b) { b.disabled = true; });
    document.getElementById("log-box").innerHTML = '<div class="log-empty"><span class="spinner"></span>' + msg + '</div>';
    document.getElementById("status").innerHTML  = '<span class="spinner"></span>' + msg;
  }

  function setStatus(html, busy) {
    if (!busy) document.querySelectorAll("button").forEach(function(b) { b.disabled = false; });
    document.getElementById("status").innerHTML = html;
  }

  function esc(s) {
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }
</script>
</body>
</html>
